<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-WorkBridge — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--green-50:#f0f7e8;--green-100:#e4f0d5;--green-200:#c8e3aa;--green-400:#8bbe5a;--green-600:#5a8f2e;--green-800:#2d5010;--gray-50:#f8f9f7;--gray-100:#f0f2ee;--gray-300:#c8cdc3;--gray-500:#7a8270;--gray-700:#3d4438;--gray-900:#1a1f16;--white:#fff;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,var(--white) 0%,var(--green-50) 100%);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
nav{background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--green-100);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;background:var(--green-600);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:500}
.nav-logo-text{font-size:17px;font-weight:500;color:var(--gray-900)}.nav-logo-text span{color:var(--green-600)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.auth-card{background:white;border:1px solid var(--green-100);border-radius:20px;padding:48px 44px;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(90,143,46,0.08)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{width:52px;height:52px;background:var(--green-600);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:22px;font-weight:500;margin-bottom:12px}
.auth-logo-text{font-size:20px;font-weight:500;color:var(--gray-900)}.auth-logo-text span{color:var(--green-600)}
.auth-tabs{display:flex;border:1px solid var(--green-200);border-radius:10px;overflow:hidden;margin-bottom:28px}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;color:var(--gray-500);cursor:pointer;background:transparent;border:none;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s}
.auth-tab.active{background:var(--green-600);color:white;font-weight:500}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:var(--gray-700);margin-bottom:6px;display:block}
.form-input{width:100%;padding:11px 14px;border:1px solid var(--green-200);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--gray-900);outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--green-600)}
.form-input.error{border-color:var(--red)}
.error-msg{font-size:12px;color:var(--red);margin-top:4px;display:none}
.error-msg.show{display:block}
.btn-submit{width:100%;padding:13px;background:var(--green-600);color:white;border:none;border-radius:10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background 0.2s;margin-top:8px;font-weight:400}
.btn-submit:hover{background:var(--green-800)}
.btn-submit:disabled{background:var(--gray-300);cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;font-size:13px;color:var(--gray-300)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--green-100)}
.btn-google{width:100%;padding:12px;background:white;color:var(--gray-700);border:1px solid var(--green-200);border-radius:10px;font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{background:var(--green-50);border-color:var(--green-400)}
.google-icon{width:20px;height:20px}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:white;padding:12px 24px;border-radius:10px;font-size:14px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:none;text-align:center;padding:8px;font-size:13px;color:var(--gray-500)}
.name-group{display:none}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:var(--gray-500)}
.back-link a{color:var(--green-600);text-decoration:none}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">K</div>
    <div class="nav-logo-text">K-Work<span>Bridge</span></div>
  </a>
</nav>

<div class="main">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">K</div>
      <div class="auth-logo-text">K-Work<span>Bridge</span></div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <div id="form-area">
      <div class="form-group name-group" id="name-group">
        <label class="form-label">이름</label>
        <input type="text" class="form-input" id="input-name" placeholder="홍길동">
        <div class="error-msg" id="err-name">이름을 입력해주세요</div>
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="input-email" placeholder="example@email.com">
        <div class="error-msg" id="err-email">올바른 이메일을 입력해주세요</div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" id="input-pw" placeholder="6자 이상 입력해주세요">
        <div class="error-msg" id="err-pw">비밀번호는 6자 이상이어야 합니다</div>
      </div>
      <div class="loading" id="loading">처리 중...</div>
      <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">로그인</button>
    </div>

    <div class="divider">또는</div>

    <button class="btn-google" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google 계정으로 계속하기
    </button>

    <div class="back-link">
      <a href="index.html">← 홈으로 돌아가기</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let mode = 'login';

auth.onAuthStateChanged(user => {
  if (user) {
    const redirect = new URLSearchParams(window.location.search).get('redirect') || 'board.html';
    window.location.href = redirect;
  }
});

function switchTab(tab) {
  mode = tab;
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('name-group').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('btn-submit').textContent = tab === 'login' ? '로그인' : '회원가입';
  clearErrors();
}

function clearErrors() {
  document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.form-input').forEach(e => e.classList.remove('error'));
}

function showError(id, inputId) {
  document.getElementById(id).classList.add('show');
  if (inputId) document.getElementById(inputId).classList.add('error');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#ef4444' : '#1a1f16';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('btn-submit').disabled = on;
}

async function handleSubmit() {
  clearErrors();
  const email = document.getElementById('input-email').value.trim();
  const pw = document.getElementById('input-pw').value;
  const name = document.getElementById('input-name').value.trim();
  let valid = true;

  if (mode === 'signup' && !name) { showError('err-name', 'input-name'); valid = false; }
  if (!email || !/\S+@\S+\.\S+/.test(email)) { showError('err-email', 'input-email'); valid = false; }
  if (!pw || pw.length < 6) { showError('err-pw', 'input-pw'); valid = false; }
  if (!valid) return;

  setLoading(true);
  try {
    if (mode === 'login') {
      await auth.signInWithEmailAndPassword(email, pw);
      showToast('로그인 성공! 환영합니다 😊');
    } else {
      const cred = await auth.createUserWithEmailAndPassword(email, pw);
      await cred.user.updateProfile({ displayName: name });
      await db.collection('users').doc(cred.user.uid).set({
        name, email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('회원가입 완료! 환영합니다 🎉');
    }
  } catch (e) {
    const msgs = {
      'auth/user-not-found': '등록되지 않은 이메일이에요',
      'auth/wrong-password': '비밀번호가 틀렸어요',
      'auth/email-already-in-use': '이미 사용 중인 이메일이에요',
      'auth/invalid-email': '올바른 이메일 형식이 아니에요',
      'auth/invalid-credential': '이메일 또는 비밀번호가 틀렸어요',
    };
    showToast(msgs[e.code] || '오류가 발생했어요: ' + e.message, true);
    setLoading(false);
  }
}

async function handleGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    showToast('구글 로그인 성공! 🎉');
  } catch (e) {
    showToast('구글 로그인 실패: ' + e.message, true);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmit();
});
</script>
</body>
</html>
